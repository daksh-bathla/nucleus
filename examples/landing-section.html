<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nucleus CSS — Landing section example</title>
    <link rel="stylesheet" href="../dist/nucleus.min.css" />
  </head>
  <body>
    <section class="n-section n-gradient-mesh">
      <div class="n-container">
        <div class="n-switcher" style="--n-switcher-threshold: 40rem">
          <div class="n-flow">
            <span class="n-overline">Pricing</span>
            <h2 class="n-text-3xl n-text-balance">Simple, transparent plans</h2>
            <p class="n-lead">Start free. Upgrade when your team grows.</p>
            <div class="n-cluster">
              <a class="n-btn n-btn-primary" href="#">Start free</a>
              <a class="n-btn n-btn-outline-primary" href="#">Compare plans</a>
            </div>
          </div>

          <div class="n-surface n-p-4 n-flow">
            <div class="n-split">
              <strong>Pro</strong>
              <span class="n-badge n-badge-primary">Popular</span>
            </div>
            <p class="n-stat-value">$12<span class="n-text-base n-text-muted">/mo</span></p>
            <ul class="n-list">
              <li>Unlimited projects</li>
              <li>Priority support</li>
              <li>Team roles</li>
            </ul>
            <button class="n-btn n-btn-primary n-w-full">Choose Pro</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>

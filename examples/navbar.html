<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nucleus CSS — Navbar example</title>
    <link rel="stylesheet" href="../dist/nucleus.min.css" />
  </head>
  <body>
    <nav class="n-navbar">
      <a class="n-navbar-brand" href="#">◎ Nucleus</a>
      <details class="n-navbar-menu">
        <summary class="n-navbar-toggle">
          <span class="n-navbar-toggle-icon" aria-hidden="true"></span>
          <span class="n-sr-only">Navigation menu</span>
        </summary>
        <ul class="n-nav">
          <li class="n-nav-item"><a class="n-nav-link" href="#" aria-current="page">Product</a></li>
          <li class="n-nav-item"><a class="n-nav-link" href="#">Docs</a></li>
          <li class="n-nav-item"><a class="n-nav-link" href="#">Pricing</a></li>
          <li class="n-nav-item"><a class="n-nav-link" href="#">Blog</a></li>
          <li class="n-nav-item"><a class="n-nav-link" href="#">Sign in</a></li>
          <li class="n-nav-item"><a class="n-nav-link" href="#">Get started</a></li>
        </ul>
      </details>
    </nav>

    <main class="n-container n-section">
      <nav aria-label="Breadcrumb">
        <ol class="n-breadcrumb">
          <li><a href="#">Home</a></li>
          <li><a href="#">Docs</a></li>
          <li aria-current="page">Navbar</li>
        </ol>
      </nav>
      <p class="n-mt-4 n-text-muted">
        The navbar is sticky, uses a CSS-only native disclosure menu, and marks the current link with
        <code class="n-code">aria-current="page"</code>.
      </p>
    </main>
  </body>
</html>
